services:
  redis:
    image: redis:7-alpine
    container_name: faction-wars-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

  srh:
    image: hiett/serverless-redis-http:latest
    container_name: faction-wars-srh
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      SRH_MODE: env
      SRH_TOKEN: local_dev_token
      SRH_CONNECTION_STRING: redis://redis:6379
    ports:
      - "8079:80"

volumes:
  redis-data:
